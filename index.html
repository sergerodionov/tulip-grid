<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>TulipGrid</title>
  <meta name="description" content="An interactive aerial tulip field — click or drag strips to remix the landscape.">

  <!-- OpenGraph -->
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="TulipGrid">
  <meta property="og:description" content="An interactive aerial tulip field — click or drag strips to remix the landscape.">
  <meta property="og:image"       content="OG.jpg">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="TulipGrid">
  <meta name="twitter:description" content="An interactive aerial tulip field — click or drag strips to remix the landscape.">
  <meta name="twitter:image"       content="OG.jpg">
  <link rel="icon" type="image/png" href="fav-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
  <link rel="preload" href="images/01.jpg" as="image" fetchpriority="high">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100vw;
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      background: #000;
      -webkit-font-smoothing: antialiased;
    }

    body {
      height: var(--vh, 100dvh);
      min-height: var(--vh, 100dvh);
    }

    /*
      ── Image scaling rules ──

      • Fit the image's shortest side to the browser window.
      • Crop the longest side when necessary.
      • Always fully cover the viewport — never any black gaps.
      • Preserve proportions, never tile or repeat.
      • Landscape: keep image upright, split into 64 vertical rows.
      • Portrait:  rotate composition 90°, split into 64 horizontal rows.

      ── Implementation ──

      Source image aspect = 2000 / 1066 ≈ 1.8762.
      Cover-scaling is expressed natively in CSS with two
      max() expressions on a pair of custom properties:

        Landscape:
          --gw = max(100vw,  100dvh * imgW/imgH)
          --gh = max(100dvh, 100vw  * imgH/imgW)

        Portrait (pre-rotation, viewport dims swapped):
          --gw = max(100dvh, 100vw  * imgW/imgH)
          --gh = max(100vw,  100dvh * imgH/imgW)

      Whichever axis would otherwise leave a gap is forced up
      to the cover-required size; the other axis matches the
      viewport. Aspect ratio is preserved because both
      expressions share the same image ratio constant.

      All 64 strip-img elements use the same --gw / --gh, so
      rows stay perfectly aligned across resize, rotation,
      shuffle, reset and download — there is exactly one
      source of truth for the geometry.
    */

    /*
      --vh holds the actual visible viewport height. JS sets it
      from window.innerHeight (which respects mobile URL bars,
      embedded webviews and preview panels). CSS falls back to
      100dvh if JS hasn't run yet.
    */
    :root {
      --vh: 100dvh;
      --gw: max(100vw, calc(var(--vh) * 2000 / 1066));
      --gh: max(var(--vh), calc(100vw * 1066 / 2000));
    }

    @media (orientation: portrait) {
      :root {
        --gw: max(var(--vh), calc(100vw * 2000 / 1066));
        --gh: max(100vw, calc(var(--vh) * 1066 / 2000));
      }
    }

    /* ── Grid stage ──
       Acts as a viewport-sized window that hides any overflow
       from the rotated / cover-scaled grid. */
    #stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Grid ──
       Sized to the cover-scaled image dimensions and centred in
       the stage. In portrait the grid is rotated 90deg around
       its centre so that 64 vertical strips become 64 horizontal
       bands on screen. */
    #grid {
      display: flex;
      position: absolute;
      top: 50%;
      left: 50%;
      width: var(--gw);
      height: var(--gh);
      transform: translate(-50%, -50%);
      transform-origin: center center;
      will-change: transform;
    }

    @media (orientation: portrait) {
      #grid {
        transform: translate(-50%, -50%) rotate(90deg);
      }
    }

    .strip {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    /*
      Each strip is rendered by a single small <canvas>. The canvas
      fills its strip and we draw the appropriate column from the
      source image via ctx.drawImage. This is dramatically more
      memory-efficient than 128 large <img> elements (which is what
      the earlier two-layer crossfade approach used, and which made
      iOS Safari crash with a "a problem occurred" reload after the
      Shuffle button fired 64 concurrent decodes). The 8 source
      images are decoded once each, shared across all 64 canvases.
    */
    .strip-canvas {
      display: block;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Controls ── */
    /*
      Desktop: horizontal row of icon buttons, top-right.
      Portrait: vertical column, right-center (see portrait media query).
    */
    #controls {
      position: fixed;
      top: 20px;
      right: 1.56%;
      display: flex;
      flex-direction: row;
      gap: 12px;
      z-index: 100;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      padding: 4px;
      background: #fff;
      border: none;
      border-radius: 50%;
      color: #000;
      cursor: pointer;
      transition: transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      flex-shrink: 0;
      /* Pre-promote to GPU layer so hover scale never causes a blink */
      will-change: transform;
    }

    .btn:hover { transform: scale(1.12); }
    .btn:active { transform: scale(0.90); }

    .btn.loading-state {
      opacity: 0.35;
      pointer-events: none;
    }

    .btn svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      color: #000;
    }

    /* Sound button: toggle between muted/on icons via parent class */
    #btnSound .icon-sound-on { display: none; }
    #btnSound.on .icon-sound-muted { display: none; }
    #btnSound.on .icon-sound-on { display: block; }

    /* ── Initial-hidden state for typewriter reveal ──
       Buttons and overlay text start invisible; JS fades them in
       character-by-character (text) and one-by-one (icons) after the
       loading screen disappears. */
    .btn {
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.15s ease;
      pointer-events: none;
    }
    .btn.revealed {
      opacity: 1;
      pointer-events: auto;
    }

    .tw-char {
      opacity: 0;
    }
    .tw-char.shown {
      opacity: 1;
    }

    /* ── Overlay text (logo, note, copyright) ── */
    /*
      All three are fixed overlays in viewport coordinates, so they
      are unaffected by the 90° grid rotation in portrait mode.
      Text is selectable and the copyright link is clickable.
    */
    #logo, #ui-note, #copyright {
      position: fixed;
      font-family: 'Jersey 10', monospace;
      font-style: normal;
      line-height: normal;
      color: #fff;
      margin: 0;
      user-select: text;
      -webkit-user-select: text;
      z-index: 10;
    }
    #logo, #ui-note {
      white-space: nowrap;
    }

    /* Desktop positions */
    #logo {
      font-size: 96px;
      top: 20px;
      left: 1.56%;
    }

    #ui-note {
      font-size: 20px;
      bottom: 20px;
      left: 1.56%;
    }

    #copyright {
      font-size: 20px;
      bottom: 20px;
      right: 1.56%;
      text-align: right;
      line-height: 1;
    }

    #copyright .cline {
      display: block;
      white-space: nowrap;
    }

    /* Hide the correct note variant (toggled via portrait query) */
    .note-portrait { display: none; }

    /* Copyright link */
    #copyright a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
    }
    #copyright a:hover {
      text-decoration: none;
    }

    /* ── Loading screen ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #080808;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: opacity 0.7s ease;
    }

    #loading.done {
      opacity: 0;
      pointer-events: none;
    }

    .loading-ring {
      width: 28px;
      height: 28px;
      border: 1.5px solid rgba(255, 255, 255, 0.12);
      border-top-color: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Portrait (mobile) layout overrides ── */
    @media (orientation: portrait) {
      /* Logo: top-center */
      #logo {
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
      }

      /* Note: just below the logo, centered */
      #ui-note {
        bottom: auto;
        top: 101px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
      }

      /* Swap note text: "Tap" instead of "Click" */
      .note-landscape { display: none; }
      .note-portrait  { display: inline; }

      /* Copyright: bottom-center */
      #copyright {
        right: auto;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        text-align: center;
      }

      /* Controls: vertical column, right-center */
      #controls {
        top: 50%;
        right: 21px;
        transform: translateY(-50%);
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<p id="logo" aria-label="TulipGrid">TulipGrid</p>

<p id="ui-note">
  <span class="note-landscape">Click rows to remix the landscape</span>
  <span class="note-portrait">Tap rows to remix the landscape</span>
</p>

<p id="copyright">
  <span class="cline">Shot with a lightweight drone</span>
  <span class="cline">in Hillegom and Schagen, Netherlands,</span>
  <span class="cline">April 2026 © <a href="https://rodionov.se" target="_blank" rel="noopener noreferrer">Sergii Rodionov</a></span>
</p>

<div id="loading" aria-label="Loading" role="status">
  <div class="loading-ring"></div>
</div>

<div id="stage" aria-hidden="false">
  <div id="grid" role="img" aria-label="Interactive field grid"></div>
</div>

<nav id="controls" aria-label="Controls">

    </svg>
  </button>

  <button class="btn" id="btnReset" type="button" aria-label="Reset to original">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path fill="currentColor" d="M3 14H6V17H3V14ZM4 16H7V19H4V16ZM6 18H9V21H6V18ZM9 19H12V22H9V19ZM12 19H15V22H12V19ZM15 18H18V21H15V18ZM17 16H20V19H17V16ZM19 14H22V17H19V14ZM20 11H23V14H20V11ZM20 8H23V11H20V8ZM19 6H22V9H19V6ZM17 4H20V7H17V4ZM15 2H18V5H15V2ZM12 2H15V5H12V2ZM9 2H12V5H9V2ZM7 3H10V6H7V3ZM5 4H8V7H5V4ZM3 6H6V9H3V6ZM4 11H1V8H4V11ZM4 8H1V5H4V8ZM4 5H1V2H4V5ZM7 11H4V8H7V11ZM10 11H7V8H10V11Z"/>

    <svg viewBox="0 0 25 24" fill="none" aria-hidden="true">
      <path fill="currentColor" d="M2 14H5V17H2V14ZM5 8H8V11H5V8ZM7 10H10V13H7V10ZM9 12H12V15H9V12ZM11 14H14V17H11V14ZM11 2H14V5H11V2ZM11 5H14V8H11V5ZM11 8H14V11H11V8ZM11 11H14V14H11V11ZM13 12H16V15H13V12ZM15 10H18V13H15V10ZM17 8H20V11H17V8ZM2 17H5V20H2V17ZM2 19H5V22H2V19ZM5 19H8V22H5V19ZM8 19H11V22H8V19ZM11 19H14V22H11V19ZM14 19H17V22H14V19ZM17 19H21V22H17V19ZM20 19H23V22H20V19ZM20 16H23V19H20V16ZM20 14H23V17H20V14Z"/>

  <button class="btn" id="btnSound" type="button" aria-label="Toggle sound" aria-pressed="false">
    <svg class="icon-sound-muted" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path fill="currentColor" d="M1 8H4V11H1V8ZM4 8H7V11H4V8ZM4 13H7V16H4V13ZM6 15H9V18H6V15ZM6 9V6H9V9H6ZM8 17H11V20H8V17ZM8 7V4H11V7H8ZM10 19H13V22H10V19ZM10 16H13V19H10V16ZM10 13H13V16H10V13ZM10 10H13V13H10V10ZM10 7H13V10H10V7ZM10 4H13V7H10V4ZM10 2H13V5H10V2ZM1 11H4V14H1V11ZM1 13H4V16H1V13ZM14 8H17V11H14V8ZM16 10H19V13H16V10ZM18 12H21V15H18V12ZM14 14H17V17H14V14ZM17 11H20V14H17V11ZM20 8H23V11H20V8ZM20 14H23V17H20V14Z"/>
    </svg>
    <svg class="icon-sound-on" viewBox="0 0 23 24" fill="none" aria-hidden="true">
      <path fill="currentColor" d="M1 8H4V11H1V8ZM4 8H7V11H4V8ZM4 13H7V16H4V13ZM6 15H9V18H6V15ZM6 9V6H9V9H6ZM8 17H11V20H8V17ZM8 7V4H11V7H8ZM10 19H13V22H10V19ZM10 16H13V19H10V16ZM10 13H13V16H10V13ZM10 10H13V13H10V10ZM10 7H13V10H10V7ZM10 4H13V7H10V4ZM10 2H13V5H10V2ZM15 4H18V7H15V4ZM15 17H18V20H15V17ZM17 6H20V9H17V6ZM17 15H20V18H17V15ZM19 9H22V12H19V9ZM19 12H22V15H19V12ZM1 11H4V14H1V11ZM1 13H4V16H1V13Z"/>
    </svg>
  </button>
</nav>

<script>
(function () {
  'use strict';

  /* ── Config ───────────────────────────────────────────── */
  const STRIP_COUNT = 64;
  const IMAGE_SRCS = [
    'images/01.jpg',
    'images/02.jpg',
    'images/03.jpg',
    'images/04.jpg',
    'images/05.jpg',
    'images/06.jpg',
    'images/07.jpg',
    'images/08.jpg',
  ];
  const N = IMAGE_SRCS.length;

  // Natural pixel dimensions of every source image (they're all the same).
  const IMG_W = 2000;
  const IMG_H = 1066;

  /* ── State ────────────────────────────────────────────── */
  const state = new Uint8Array(STRIP_COUNT); // current image index per strip
  const strips = [];                          // strip descriptors
  const imgCache = new Array(N).fill(null);  // loaded Image objects for canvas
  let pendingTimers = [];                     // stagger timeout IDs

  /* ── Build DOM ────────────────────────────────────────── */
  const stage = document.getElementById('stage');
  const grid = document.getElementById('grid');
  const loadingEl = document.getElementById('loading');

  /*
    ── Robust viewport height ──
    Some environments (iOS Safari with URL bar, embedded
    webviews, preview iframes) compute 100dvh in ways that
    leave gaps. We mirror window.innerHeight onto a CSS
    custom property so the cover formulas always reference
    the real visible height.
  */
  function setVH() {
    document.documentElement.style.setProperty('--vh', window.innerHeight + 'px');
  }
  setVH();

  // Bundle the viewport-changed callbacks: update --vh, then resize
  // every strip canvas to its new physical pixel dimensions. resizeCanvases
  // is a no-op before strips are built; it's referenced (hoisted) at
  // registration time but only called once the page is interactive.
  function onViewportChange() {
    setVH();
    if (typeof resizeCanvases === 'function') resizeCanvases();
  }
  window.addEventListener('resize', onViewportChange);
  window.addEventListener('orientationchange', onViewportChange);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', onViewportChange);
  }

  /* ── Cover-scale dimensions (mirrors the CSS) ─────────── */
  /*
    The CSS uses max() to cover-scale the grid in both
    orientations. This helper returns the same dimensions in
    pixels so the canvas exporter can render an identical
    composition.
  */
  function getCoverDims() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const portrait = matchMedia('(orientation: portrait)').matches;

    // Container dimensions BEFORE rotation: swapped in portrait.
    const cw = portrait ? vh : vw;
    const ch = portrait ? vw : vh;

    const scale = Math.max(cw / IMG_W, ch / IMG_H);
    return {
      portrait,
      vw, vh,
      gridW: IMG_W * scale,
      gridH: IMG_H * scale,
    };
  }

  for (let i = 0; i < STRIP_COUNT; i++) {
    const div = document.createElement('div');
    div.className = 'strip';
    div.dataset.idx = i;

    const canvas = document.createElement('canvas');
    canvas.className = 'strip-canvas';

    div.appendChild(canvas);
    grid.appendChild(div);

    strips.push({
      div,
      canvas,
      ctx: canvas.getContext('2d', { alpha: false }),
      currentIdx: 0,   // image fully shown before any in-flight animation started
      animFrame: null, // rAF id while animating
    });
  }

  /*
    Draw a single strip's slice of source image `imgIdx` onto its canvas,
    fully opaque (used for initial render and for snapping to a transition's
    final state). `alpha` is applied via ctx.globalAlpha.
  */
  function paintFull(s, i, imgIdx) {
    const img = imgCache[imgIdx];
    if (!img || s.canvas.width === 0) return;
    const srcSW = IMG_W / STRIP_COUNT;
    s.ctx.globalAlpha = 1;
    s.ctx.drawImage(img, i * srcSW, 0, srcSW, IMG_H, 0, 0, s.canvas.width, s.canvas.height);
  }

  /*
    Crossfade frame: draw `fromIdx` at full alpha, then `toIdx` at alpha t.
    Because the from-image is always painted at alpha 1 first, the canvas
    never goes through a transparent state — no black flashes are possible.
  */
  function paintBlend(s, i, fromIdx, toIdx, t) {
    if (s.canvas.width === 0) return;
    const srcSW = IMG_W / STRIP_COUNT;
    const sx = i * srcSW;
    const oldImg = imgCache[fromIdx];
    const newImg = imgCache[toIdx];
    s.ctx.globalAlpha = 1;
    if (oldImg) s.ctx.drawImage(oldImg, sx, 0, srcSW, IMG_H, 0, 0, s.canvas.width, s.canvas.height);
    s.ctx.globalAlpha = t;
    if (newImg) s.ctx.drawImage(newImg, sx, 0, srcSW, IMG_H, 0, 0, s.canvas.width, s.canvas.height);
  }

  /*
    Resize the physical pixel dimensions of every strip canvas to match
    its current CSS display size at devicePixelRatio for crisp rendering.
    Setting canvas.width/height clears the canvas, so we redraw immediately.
    Called on initial load, resize, and orientationchange.
  */
  function resizeCanvases() {
    const { gridW, gridH } = getCoverDims();
    const stripPx = gridW / STRIP_COUNT;
    const dpr = window.devicePixelRatio || 1;
    const w = Math.max(1, Math.ceil(stripPx * dpr));
    const h = Math.max(1, Math.ceil(gridH * dpr));

    for (let i = 0; i < STRIP_COUNT; i++) {
      const s = strips[i];
      if (s.canvas.width !== w || s.canvas.height !== h) {
        // Cancel any in-flight crossfade so it doesn't draw at the wrong size.
        if (s.animFrame !== null) {
          cancelAnimationFrame(s.animFrame);
          s.currentIdx = state[i];
          s.animFrame = null;
        }
        s.canvas.width = w;
        s.canvas.height = h;
        paintFull(s, i, s.currentIdx);
      }
    }
  }

  /* ── Preload strategy ────────────────────────────────── */
  /*
    Mobile Safari crashes when 8 large JPEGs are decoded simultaneously
    (each 2000×1066 × 4 bytes ≈ 8 MB decoded; ×8 = ~68 MB before the
    UI even appears). We therefore split loading into two phases:

    Phase 1 — block on image 0 only.
      One decode() call, one image in memory. The loading screen
      disappears as soon as image 0 is paint-ready.

    Phase 2 — background-fetch images 1–7 after the UI is visible.
      Plain <img> onload, no decode(), no memory spike. imgCache is
      populated lazily; strip transitions work fine because the browser
      HTTP-cache makes src-swaps near-instant once an image has been
      fetched at least once.

    The 64-strip decode() wave from the old onAllLoaded is also gone —
    setting src on elements whose URL is already in the HTTP cache is
    enough; the browser reuses the decoded bitmap without a separate
    decode step.
  */

  // Phase 1: load image 0, set all strips, reveal UI.
  const seed = new Image();
  seed.src = IMAGE_SRCS[0];

  const onSeedReady = () => {
    imgCache[0] = seed.naturalWidth > 0 ? seed : null;

    // Size every canvas to its strip and paint image 0 onto it.
    // drawImage from a pre-decoded HTMLImageElement is synchronous and
    // GPU-accelerated, so all 64 strips render in a single frame with
    // zero memory spike.
    resizeCanvases();
    for (let i = 0; i < STRIP_COUNT; i++) {
      paintFull(strips[i], i, 0);
    }

    // Two rAF ticks let the browser commit the canvas paints before
    // we fade the loading screen out. setTimeout fallback guarantees
    // progress even if rAF is throttled (e.g. background tabs or
    // certain headless/preview environments where rAF never fires).
    let revealFired = false;
    const doReveal = () => { if (!revealFired) { revealFired = true; revealUI(); } };
    requestAnimationFrame(() => requestAnimationFrame(doReveal));
    setTimeout(doReveal, 200);

    // Phase 2: silently fetch images 1–7 in the background.
    IMAGE_SRCS.slice(1).forEach((src, j) => {
      const idx = j + 1;
      const img = new Image();
      img.onload  = () => { imgCache[idx] = img; };
      img.onerror = () => {};
      img.src = src;
    });
  };

  // Fallback: if decode() hangs for > 8 s, reveal UI anyway.
  const seedTimeout = setTimeout(onSeedReady, 8000);

  if (typeof seed.decode === 'function') {
    seed.decode()
      .then(() => { clearTimeout(seedTimeout); onSeedReady(); })
      .catch(() => { clearTimeout(seedTimeout); onSeedReady(); });
  } else {
    seed.onload  = () => { clearTimeout(seedTimeout); onSeedReady(); };
    seed.onerror = () => { clearTimeout(seedTimeout); onSeedReady(); };
  }

  function revealUI() {
    setTimeout(() => {
      loadingEl.classList.add('done');
      setTimeout(() => loadingEl.remove(), 800);
      // Start typewriter + icon reveal once the loading screen begins fading.
      runIntroAnimation();
    }, 120);
  }

  /* ── Intro animation: typewriter text + sequential icon reveal ── */
  /*
    Behaviour:
      • All visible text is wrapped in per-character spans whose opacity
        starts at 0. We flip each one to opacity 1 in sequence, like a
        terminal printing characters one at a time.
      • The three text blocks (logo, note, copyright) start in an
        overlapping cascade so the total intro fits in ~3 seconds.
      • After the longest text finishes, control icons fade in one by
        one (left-to-right on desktop; top-to-bottom in portrait —
        document order matches both because the controls flex direction
        runs in the right direction for each layout).
  */
  function splitChars(el) {
    // Replace every text node inside `el` with a sequence of
    // <span class="tw-char"> wrappers — one per character. Preserves
    // nested elements (e.g. the <a> link inside the copyright).
    // Skips elements that are hidden by CSS (e.g. .note-landscape in
    // portrait mode) so the hidden variant doesn't waste animation
    // time on text the user can't see.
    const chars = [];
    const walk = (node) => {
      if (node.nodeType === Node.TEXT_NODE) {
        const text = node.textContent;
        if (!text || (/^\s*$/.test(text) && text.indexOf('\n') >= 0)) {
          // Pure whitespace between block elements — keep as-is.
          return;
        }
        const frag = document.createDocumentFragment();
        for (const ch of text) {
          const span = document.createElement('span');
          span.className = 'tw-char';
          span.textContent = ch;
          frag.appendChild(span);
          chars.push(span);
        }
        node.parentNode.replaceChild(frag, node);
      } else if (node.nodeType === Node.ELEMENT_NODE) {
        if (getComputedStyle(node).display === 'none') return;
        const children = Array.from(node.childNodes);
        for (const child of children) walk(child);
      }
    };
    walk(el);
    return chars;
  }

  let introStarted = false;

  function typewrite(chars, charDelay, startDelay) {
    return new Promise(resolve => {
      let idx = 0;
      const tick = () => {
        if (idx >= chars.length) return resolve();
        chars[idx].classList.add('shown');
        idx++;
        setTimeout(tick, charDelay);
      };
      setTimeout(tick, startDelay);
    });
  }

  function runIntroAnimation() {
    if (introStarted) return;  // guard against double-fire from preload race
    introStarted = true;
    const logoChars      = splitChars(document.getElementById('logo'));
    const noteChars      = splitChars(document.getElementById('ui-note'));
    const copyrightChars = splitChars(document.getElementById('copyright'));

    // All four threads start at t=0 in parallel — three text blocks
    // typewriting and the icon row revealing one-by-one.
    typewrite(logoChars,      45, 0);
    typewrite(noteChars,      35, 0);
    typewrite(copyrightChars, 22, 0);
    revealButtons();
  }

  function revealButtons() {
    const btns = document.querySelectorAll('#controls .btn');
    btns.forEach((btn, i) => {
      setTimeout(() => btn.classList.add('revealed'), i * 180);
    });
  }

  /* ── Core: change one strip ───────────────────────────── */
  /*
    Canvas-based crossfade. On every animation frame we:

      1. Draw the OLD image at full opacity (solid backdrop).
      2. Draw the NEW image on top at alpha = t (fade-in).

    Because the old image is always painted first at alpha 1, the
    canvas can never display a transparent or black state — no
    black flashes are possible by construction.

    On interrupt (new setStrip while one is in flight) we snap the
    canvas to the previous transition's target and start a fresh
    fade from there. The brief snap is imperceptible during rapid
    interaction such as a shuffle ripple.

    If the target image hasn't loaded yet (phase-2 lazy load is
    still in progress), we instead set src on a transient <img> and
    start the fade once it's ready. Until then the strip stays on
    its current image — the user just doesn't see that one tap
    landed for a few hundred ms. Far better than crashing.
  */
  const TRANSITION_MS = 450;

  function setStrip(i, imgIdx) {
    const s = strips[i];
    if (state[i] === imgIdx) return;

    // If the target source image isn't loaded yet, wait for it.
    // imgCache is populated as background fetches complete.
    if (!imgCache[imgIdx]) {
      // Trigger / piggyback on the background fetch and bail; user can tap again.
      const probe = new Image();
      probe.onload  = () => { imgCache[imgIdx] = probe; };
      probe.onerror = () => {};
      probe.src = IMAGE_SRCS[imgIdx];
      return;
    }

    // Snap any in-flight animation to its completed state, so the
    // new transition starts from a known, fully-painted baseline.
    if (s.animFrame !== null) {
      cancelAnimationFrame(s.animFrame);
      paintFull(s, i, state[i]);
      s.currentIdx = state[i];
      s.animFrame = null;
    }

    const fromIdx = s.currentIdx;
    state[i] = imgIdx;
    playStripTone(i);
    const start = performance.now();

    function frame(now) {
      const t = Math.min(1, (now - start) / TRANSITION_MS);
      if (t < 1) {
        paintBlend(s, i, fromIdx, imgIdx, t);
        s.animFrame = requestAnimationFrame(frame);
      } else {
        paintFull(s, i, imgIdx);
        s.currentIdx = imgIdx;
        s.animFrame = null;
      }
    }
    s.animFrame = requestAnimationFrame(frame);
  }

  function randomOther(current) {
    if (N <= 1) return current;
    let n;
    do { n = (Math.random() * N) | 0; } while (n === current);
    return n;
  }

  function clearPending() {
    pendingTimers.forEach(clearTimeout);
    pendingTimers = [];
  }

  /* ── Interaction: desktop drag + click ────────────────── */
  let isDragging = false;
  let lastDragStrip = -1;
  let dragActivations = 0;

  stage.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    isDragging = true;
    lastDragStrip = -1;
    dragActivations = 0;
    activateAt(e.clientX, e.clientY);
    document.addEventListener('mouseup', onMouseUp, { once: true });
  });

  stage.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    activateAt(e.clientX, e.clientY);
  });

  function onMouseUp() {
    isDragging = false;
  }

  // click fires after mouseup; suppress if drag already handled it
  stage.addEventListener('click', (e) => {
    if (dragActivations > 0) return;
    const div = e.target.closest('.strip');
    if (!div) return;
    const i = +div.dataset.idx;
    setStrip(i, randomOther(state[i]));
  });

  /* ── Interaction: touch drag ──────────────────────────── */
  let isTouching = false;
  let lastTouchStrip = -1;

  stage.addEventListener('touchstart', (e) => {
    isTouching = true;
    lastTouchStrip = -1;
    const t = e.touches[0];
    activateAt(t.clientX, t.clientY);
  }, { passive: true });

  stage.addEventListener('touchmove', (e) => {
    if (!isTouching) return;
    const t = e.touches[0];
    activateAt(t.clientX, t.clientY, true /* isTouchDrag */);
  }, { passive: true });

  stage.addEventListener('touchend', () => {
    isTouching = false;
    lastTouchStrip = -1;
  }, { passive: true });

  /*
    Resolve which strip is under (x, y) screen coordinates.
    Using elementFromPoint means rotation, cover-scaling and
    overflow clipping are all handled by the browser — no
    manual coordinate maths needed.
  */
  function activateAt(x, y, isTouchDrag = false) {
    const el = document.elementFromPoint(x, y);
    const div = el && el.closest ? el.closest('.strip') : null;
    if (!div) return;
    const i = +div.dataset.idx;

    const last = isTouchDrag ? lastTouchStrip : lastDragStrip;
    if (i === last) return; // same strip, skip

    if (isTouchDrag) lastTouchStrip = i;
    else { lastDragStrip = i; dragActivations++; }

    setStrip(i, randomOther(state[i]));
  }

  /* ── Buttons ──────────────────────────────────────────── */
  document.getElementById('btnShuffle').addEventListener('click', (e) => {
    e.stopPropagation();
    clearPending();

    // Ripple left-to-right with stagger.
    // Generation is now managed inside setStrip so no external gen
    // bookkeeping needed here; clearPending() handles in-flight timers.
    const delay = Math.max(3, 380 / STRIP_COUNT);
    pendingTimers = strips.map((_, i) =>
      setTimeout(() => setStrip(i, randomOther(state[i])), i * delay)
    );
  });

  document.getElementById('btnReset').addEventListener('click', (e) => {
    e.stopPropagation();
    clearPending();

    const delay = Math.max(3, 380 / STRIP_COUNT);
    pendingTimers = strips.map((_, i) =>
      setTimeout(() => setStrip(i, 0), i * delay)
    );
  });

  document.getElementById('btnDownload').addEventListener('click', (e) => {
    e.stopPropagation();
    downloadCanvas();
  });

  /* ── Sound system ─────────────────────────────────────── */
  /*
    Two layers of audio, both generated on-the-fly via Web Audio API
    (no audio files to ship, no decode delay, no per-row mp3s):

      • Ambient drone — a low sine oscillator (~55 Hz) plus filtered
        white noise, sitting at ~6% gain. Feels like a powered-on
        arcade cabinet. Fades in/out over 500ms / 300ms.

      • Row tones — 64 short blips, one per strip. Pitch climbs
        exponentially from 110 Hz (row 0) to 1760 Hz (row 63),
        spanning four octaves. Waveform shifts by quartile (sine →
        triangle → square → sawtooth) so the lower rows feel softer,
        the upper rows crisper. Each blip is 80–180 ms with a fast
        attack and exponential decay, plus a slight downward pitch
        sweep for retro character.

    Browsers block autoplay before the first user gesture, so the
    AudioContext is created lazily inside the sound-toggle click
    handler. If the user never enables sound, no audio code runs.
  */
  let audioCtx     = null;
  let ambient      = null;
  let soundOn      = false;
  const btnSound   = document.getElementById('btnSound');

  function ensureAudioCtx() {
    if (audioCtx) return audioCtx;
    const Ctor = window.AudioContext || window.webkitAudioContext;
    if (!Ctor) return null;
    audioCtx = new Ctor();
    return audioCtx;
  }

  /*
    iOS Safari (and some Chromium-based mobile browsers) refuse to play any
    Web Audio output until a silent buffer has been scheduled and started
    DURING a real user gesture. Just calling ctx.resume() inside the click
    handler is not always enough — the context unlocks but never emits sound.
    Playing a one-sample silent buffer on the gesture event reliably unlocks
    the audio pipeline. Called exactly once.
  */
  let audioUnlocked = false;
  function unlockAudio() {
    if (audioUnlocked) return;
    const ctx = ensureAudioCtx();
    if (!ctx) return;
    // Resume — must be called synchronously from the gesture handler on iOS.
    if (ctx.state === 'suspended') ctx.resume();
    // Schedule + play silent buffer on the same tick.
    const buf  = ctx.createBuffer(1, 1, 22050);
    const src  = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    audioUnlocked = true;
  }

  function startAmbient() {
    const ctx = ensureAudioCtx();
    if (!ctx || ambient) return;
    if (ctx.state === 'suspended') ctx.resume();

    // Low drone oscillator with subtle LFO modulation on its frequency.
    const drone = ctx.createOscillator();
    drone.type = 'sine';
    drone.frequency.value = 55;

    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.25;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 1.5;
    lfo.connect(lfoGain).connect(drone.frequency);

    // Filtered white noise for warmth / static.
    const bufLen = 2 * ctx.sampleRate;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    noise.loop = true;
    const noiseGain = ctx.createGain();
    noiseGain.gain.value = 0.04;

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 350;

    const master = ctx.createGain();
    master.gain.setValueAtTime(0, ctx.currentTime);
    master.gain.linearRampToValueAtTime(0.06, ctx.currentTime + 0.5);

    drone.connect(filter);
    noise.connect(noiseGain).connect(filter);
    filter.connect(master).connect(ctx.destination);

    drone.start();
    lfo.start();
    noise.start();

    ambient = { drone, lfo, noise, master };
  }

  function stopAmbient() {
    if (!ambient || !audioCtx) return;
    const ctx = audioCtx;
    const { master, drone, lfo, noise } = ambient;
    const now = ctx.currentTime;
    master.gain.cancelScheduledValues(now);
    master.gain.setValueAtTime(master.gain.value, now);
    master.gain.linearRampToValueAtTime(0, now + 0.3);
    const refs = ambient;
    ambient = null;
    setTimeout(() => {
      try { refs.drone.stop(); refs.lfo.stop(); refs.noise.stop(); } catch (e) {}
    }, 350);
  }

  function playStripTone(i) {
    if (!soundOn || !audioCtx) return;
    const ctx = audioCtx;
    const now = ctx.currentTime;

    // Pitch: 110 Hz at row 0 → 1760 Hz at row 63 (4 octaves, A2 → A6).
    const freq = 110 * Math.pow(2, (i / 63) * 4);
    // Quartile-based waveform shift for tonal variety across the range.
    const wf = ['sine', 'triangle', 'square', 'sawtooth'][Math.min(3, Math.floor(i / 16))];
    // Higher rows ring shorter — keeps shuffle waves crisp, not muddy.
    const dur = 0.18 - (i / 63) * 0.10;

    const osc = ctx.createOscillator();
    osc.type = wf;
    osc.frequency.setValueAtTime(freq, now);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.92, now + dur);

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.14, now + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);

    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + dur + 0.05);
  }

  btnSound.addEventListener('click', (e) => {
    e.stopPropagation();
    // Must run inside the user gesture, before any awaits, to unlock audio on iOS.
    unlockAudio();
    soundOn = !soundOn;
    btnSound.classList.toggle('on', soundOn);
    btnSound.setAttribute('aria-pressed', soundOn ? 'true' : 'false');
    if (soundOn) startAmbient(); else stopAmbient();
  });

  /* ── Download via canvas ──────────────────────────────── */
  /*
    Re-render the current composition at a fixed 1600 px long-side,
    drop the UI chrome (note + copyright + controls), and overlay just
    the TulipGrid logo in the same relative position as on the page.

    Pipeline:
      1. Compute a uniform scale so the longer viewport dimension
         maps to 1600 px in the exported image. Aspect ratio matches
         what's on screen.
      2. Draw the 64 strip slices into a pre-rotation offscreen buffer
         (swapped dimensions in portrait, same as the live render).
      3. Copy that buffer onto the final canvas, applying a 90° CW
         rotation in portrait so the output matches the visible
         orientation.
      4. Paint the TulipGrid logo on top using the same Jersey 10
         font, font-size and position the page uses — scaled by the
         same factor as the image.
  */
  async function downloadCanvas() {
    const btn = document.getElementById('btnDownload');
    btn.classList.add('loading-state');

    // The Jersey 10 web font must be fully loaded before canvas can
    // render it. document.fonts.ready resolves once all CSS fonts the
    // page declares have finished loading.
    if (document.fonts && document.fonts.ready) {
      try { await document.fonts.ready; } catch (e) {}
    }

    const { portrait, vw, vh, gridW: gW, gridH: gH } = getCoverDims();

    const TARGET   = 1600;
    const longSide = Math.max(vw, vh);
    const scale    = TARGET / longSide;
    const outW     = Math.round(vw * scale);
    const outH     = Math.round(vh * scale);

    // Pre-rotation buffer dims (swapped in portrait — the grid is
    // built upright then rotated 90° onto the final output).
    const offW = portrait ? outH : outW;
    const offH = portrait ? outW : outH;

    const sGridW = gW * scale;
    const sGridH = gH * scale;
    const offX   = (offW - sGridW) / 2;
    const offY   = (offH - sGridH) / 2;

    const off  = document.createElement('canvas');
    off.width  = offW;
    off.height = offH;
    const octx = off.getContext('2d');
    octx.fillStyle = '#000';
    octx.fillRect(0, 0, offW, offH);

    const stripW = sGridW / STRIP_COUNT;
    const srcSW  = IMG_W / STRIP_COUNT;

    for (let i = 0; i < STRIP_COUNT; i++) {
      const img = imgCache[state[i]];
      if (!img) continue;
      octx.drawImage(
        img,
        i * srcSW, 0, srcSW, IMG_H,
        offX + i * stripW, offY, stripW, sGridH
      );
    }

    // Final output canvas, viewport-oriented.
    const out  = document.createElement('canvas');
    out.width  = outW;
    out.height = outH;
    const fctx = out.getContext('2d');

    if (portrait) {
      fctx.translate(outW, 0);
      fctx.rotate(Math.PI / 2);
      fctx.drawImage(off, 0, 0);
    } else {
      fctx.drawImage(off, 0, 0);
    }

    // Overlay TulipGrid logo. Matches the page's CSS:
    //   Desktop: top: 20px, left: 1.56%, font-size: 96px, text-align: left
    //   Portrait: top: 0, left: 50%, font-size: 96px, text-align: center
    const fontPx = 96 * scale;
    fctx.font         = `${fontPx}px "Jersey 10", monospace`;
    fctx.fillStyle    = '#fff';
    fctx.textBaseline = 'top';

    if (portrait) {
      fctx.textAlign = 'center';
      fctx.fillText('TulipGrid', outW / 2, 0);
    } else {
      fctx.textAlign = 'left';
      fctx.fillText('TulipGrid', outW * 0.0156, 20 * scale);
    }

    out.toBlob((blob) => {
      if (!blob) { btn.classList.remove('loading-state'); return; }
      const url = URL.createObjectURL(blob);
      const a = Object.assign(document.createElement('a'), {
        href: url,
        download: 'tulip-grid.jpg',
      });
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 3000);
      btn.classList.remove('loading-state');
    }, 'image/jpeg', 0.93);
  }

})();
</script>
</body>
</html>
